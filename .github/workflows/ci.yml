name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ANCHOR_VERSION: "0.30.1"
  SOLANA_VERSION: "1.18.17"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  build-programs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Solana
        uses: metadaoproject/setup-solana@v3
        with:
          solana-version: ${{ env.SOLANA_VERSION }}
      - name: Install Anchor
        uses: metadaoproject/setup-anchor@v1
        with:
          anchor-version: ${{ env.ANCHOR_VERSION }}
      - name: Build programs
        run: anchor build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anchor-programs
          path: target/deploy/

  test-programs:
    runs-on: ubuntu-latest
    needs: build-programs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: metadaoproject/setup-solana@v3
        with:
          solana-version: ${{ env.SOLANA_VERSION }}
      - uses: metadaoproject/setup-anchor@v1
        with:
          anchor-version: ${{ env.ANCHOR_VERSION }}
      - name: Run tests
        run: anchor test
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: tests/

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd app && npm ci
      - run: cd app && npm run build

  verify-programs:
    runs-on: ubuntu-latest
    needs: build-programs
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: metadaoproject/setup-solana@v3
        with:
          solana-version: ${{ env.SOLANA_VERSION }}
      - uses: metadaoproject/setup-anchor@v1
        with:
          anchor-version: ${{ env.ANCHOR_VERSION }}
      - name: Verify programs match build
        run: |
          anchor build
          # Compare built artifacts with committed ones
          diff <(sha256sum target/deploy/solmon_creature.so) <(sha256sum deployed/solmon_creature.so) || echo "WARNING: Creature program mismatch"
          diff <(sha256sum target/deploy/solmon_battle.so) <(sha256sum deployed/solmon_battle.so) || echo "WARNING: Battle program mismatch"
