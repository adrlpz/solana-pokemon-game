name: Build SOLMON Programs

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SOLANA_VERSION: '3.1.14'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Update platform-tools
        run: |
          # Force platform-tools to use latest compatible Rust
          solana --version
          # The platform-tools Rust version is what cargo-build-sbf uses internally
          # Update it by touching the version marker
          PLATFORM_TOOLS="$HOME/.cache/solana"
          if [ -d "$PLATFORM_TOOLS" ]; then
            echo "Current platform-tools:"
            ls "$PLATFORM_TOOLS/"
          fi

      - name: Generate program keypairs + update IDs
        run: |
          mkdir -p target/deploy
          solana-keygen new --no-bip39-passphrase -o target/deploy/creature-keypair.json
          solana-keygen new --no-bip39-passphrase -o target/deploy/battle-keypair.json
          solana-keygen new --no-bip39-passphrase -o target/deploy/token-keypair.json
          solana-keygen new --no-bip39-passphrase -o target/deploy/marketplace-keypair.json

          for prog in creature battle token marketplace; do
            ID=$(solana-keygen pubkey target/deploy/${prog}-keypair.json)
            echo "  $prog: $ID"
            sed -i "s/declare_id!(\".*\")/declare_id!(\"$ID\")/" programs/${prog}/src/lib.rs
            sed -i "s|${prog} = \".*\"|${prog} = \"$ID\"|g" Anchor.toml
          done

      - name: Build programs
        run: |
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"

          # cargo-build-sbf uses platform-tools Rust internally, not the system Rust
          # The lockfile must be parseable by platform-tools Cargo
          # Generate lockfile with system Rust and let cargo-build-sbf resolve
          for prog in creature battle token marketplace; do
            echo "═══ Building solmon_${prog} ═══"
            cargo build-sbf --manifest-path programs/${prog}/Cargo.toml --sbf-out-dir target/deploy/ 2>&1
            SIZE=$(stat -c%s target/deploy/solmon_${prog}.so 2>/dev/null || echo "0")
            echo "✅ solmon_${prog}: ${SIZE} bytes"
          done

      - name: Summary
        run: |
          echo "═══════════════════════════════════════"
          echo "  BUILD COMPLETE"
          echo "═══════════════════════════════════════"
          for prog in creature battle token marketplace; do
            ID=$(solana-keygen pubkey target/deploy/${prog}-keypair.json)
            SIZE=$(stat -c%s target/deploy/solmon_${prog}.so 2>/dev/null || echo "0")
            echo "  $prog: $ID ($SIZE bytes)"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solmon-programs
          path: |
            target/deploy/*.so
            target/deploy/*-keypair.json
          retention-days: 30
