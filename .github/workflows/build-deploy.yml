name: Build SOLMON Programs

on:
  push:
    branches: [main]
    paths:
      - 'programs/**'
      - 'Cargo.toml'
      - 'Anchor.toml'
  workflow_dispatch:

env:
  SOLANA_VERSION: '1.18.26'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Solana
        uses: solana-labs/actions/setup-solana@v1
        with:
          version: ${{ env.SOLANA_VERSION }}

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli --locked

      - name: Generate program keypairs
        run: |
          mkdir -p target/deploy
          solana-keygen new --no-bip39-passphrase -o target/deploy/creature-keypair.json
          solana-keygen new --no-bip39-passphrase -o target/deploy/battle-keypair.json
          solana-keygen new --no-bip39-passphrase -o target/deploy/token-keypair.json
          solana-keygen new --no-bip39-passphrase -o target/deploy/marketplace-keypair.json

          # Update Anchor.toml with generated program IDs
          CREATURE_ID=$(solana-keygen pubkey target/deploy/creature-keypair.json)
          BATTLE_ID=$(solana-keygen pubkey target/deploy/battle-keypair.json)
          TOKEN_ID=$(solana-keygen pubkey target/deploy/token-keypair.json)
          MARKETPLACE_ID=$(solana-keygen pubkey target/deploy/marketplace-keypair.json)

          echo "Program IDs:"
          echo "  Creature:    $CREATURE_ID"
          echo "  Battle:      $BATTLE_ID"
          echo "  Token:       $TOKEN_ID"
          echo "  Marketplace: $MARKETPLACE_ID"

          # Update declare_id in source
          sed -i "s/declare_id!(\".*\")/declare_id!(\"$CREATURE_ID\")/" programs/creature/src/lib.rs
          sed -i "s/declare_id!(\".*\")/declare_id!(\"$BATTLE_ID\")/" programs/battle/src/lib.rs
          sed -i "s/declare_id!(\".*\")/declare_id!(\"$TOKEN_ID\")/" programs/token/src/lib.rs
          sed -i "s/declare_id!(\".*\")/declare_id!(\"$MARKETPLACE_ID\")/" programs/marketplace/src/lib.rs

          # Update Anchor.toml
          sed -i "s|creature = \".*\"|creature = \"$CREATURE_ID\"|g" Anchor.toml
          sed -i "s|battle = \".*\"|battle = \"$BATTLE_ID\"|g" Anchor.toml
          sed -i "s|token = \".*\"|token = \"$TOKEN_ID\"|g" Anchor.toml
          sed -i "s|marketplace = \".*\"|marketplace = \"$MARKETPLACE_ID\"|g" Anchor.toml

      - name: Anchor Build
        run: anchor build

      - name: Print program info
        run: |
          echo "═══════════════════════════════════════"
          echo "  BUILD COMPLETE"
          echo "═══════════════════════════════════════"
          for prog in creature battle token marketplace; do
            ID=$(solana-keygen pubkey target/deploy/${prog}-keypair.json)
            SIZE=$(stat -c%s target/deploy/solmon_${prog}.so 2>/dev/null || echo "0")
            echo "  $prog: $ID ($SIZE bytes)"
          done

      - name: Upload program binaries
        uses: actions/upload-artifact@v4
        with:
          name: solmon-programs
          path: |
            target/deploy/*.so
            target/deploy/*-keypair.json
          retention-days: 30

      - name: Upload IDL
        uses: actions/upload-artifact@v4
        with:
          name: solmon-idl
          path: target/idl/*.json
          retention-days: 30
