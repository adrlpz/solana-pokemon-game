name: Build & Deploy SOLMON Programs

on:
  push:
    branches: [main]
    paths:
      - 'programs/**'
      - 'Cargo.toml'
      - 'Anchor.toml'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target (devnet/mainnet)'
        required: false
        default: 'devnet'

env:
  ANCHOR_VERSION: '0.30.1'
  SOLANA_VERSION: '1.18.26'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Solana
        uses: solana-labs/actions/setup-solana@v1
        with:
          version: ${{ env.SOLANA_VERSION }}

      - name: Setup Anchor CLI
        uses: Tsuzat/Anchor@v2.0.0
        with:
          anchor-version: ${{ env.ANCHOR_VERSION }}

      - name: Generate keypair
        run: |
          solana-keygen new --no-bip39-passphrase -o target/deploy/creature-keypair.json || true
          solana-keygen new --no-bip39-passphrase -o target/deploy/battle-keypair.json || true
          solana-keygen new --no-bip39-passphrase -o target/deploy/token-keypair.json || true
          solana-keygen new --no-bip39-passphrase -o target/deploy/marketplace-keypair.json || true

      - name: Anchor Build
        run: anchor build --no-idl

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solmon-programs
          path: target/deploy/*.so
          retention-days: 30

  deploy-devnet:
    needs: build
    if: github.event.inputs.deploy_target == 'devnet' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    runs-on: ubuntu-latest
    environment: devnet
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: solmon-programs
          path: target/deploy/

      - name: Setup Solana
        uses: solana-labs/actions/setup-solana@v1
        with:
          version: ${{ env.SOLANA_VERSION }}

      - name: Configure Solana for devnet
        run: |
          solana config set --url devnet
          echo "${{ secrets.DEPLOYER_KEYPAIR }}" > /tmp/deployer.json
          solana config set --keypair /tmp/deployer.json

      - name: Airdrop SOL
        run: solana airdrop 5 || true

      - name: Deploy programs
        run: |
          for prog in creature battle token marketplace; do
            SO="target/deploy/solmon_${prog}.so"
            KP="target/deploy/${prog}-keypair.json"
            if [[ -f "$SO" ]]; then
              echo "Deploying $prog..."
              solana program deploy "$SO" --program-id "$KP" --url devnet --commitment confirmed
              echo "✅ $prog deployed"
            fi
          done
